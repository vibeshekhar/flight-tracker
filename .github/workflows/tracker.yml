name: Flight Price Tracker

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 3am UTC (8:30am IST)
  workflow_dispatch:       # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:  
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run flight tracker
        run: python flight_tracker.py

      - name: Save baseline back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_baseline.json || true
          git diff --cached --quiet || git commit -m "Update price baseline [skip ci]"
          git push || true
